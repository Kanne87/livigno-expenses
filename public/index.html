<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0e1a">
  <title>Livigno 2026 · Gruppenkasse</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏂</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--bg:#080c16;--surface:rgba(255,255,255,0.03);--surface-hover:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);--border-accent:rgba(100,140,255,0.15);--text:#e0e5f0;--text-dim:#5a6f8a;--text-mid:#8899b4;--accent:#3b82f6;--green:#34d399;--red:#f87171;--gold:#fbbf24;--purple:#a78bfa;--font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden}
    .header{background:linear-gradient(135deg,#0f1829,#141e33);border-bottom:1px solid var(--border);padding:24px 20px 20px;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
    .header-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:14px}
    .header h1{font-size:19px;font-weight:700;color:#fff;letter-spacing:-0.4px}
    .header .sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-family:var(--mono)}
    .header .emoji{font-size:30px;line-height:1}
    .container{max-width:520px;margin:0 auto;padding:0 16px 120px}
    .total-card{background:linear-gradient(145deg,#111b30,#152242);border:1px solid var(--border-accent);border-radius:18px;padding:26px;margin-top:20px;position:relative;overflow:hidden}
    .total-card::before{content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;background:radial-gradient(circle,rgba(59,130,246,0.06),transparent 70%);pointer-events:none}
    .total-label{font-size:11px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono)}
    .total-amount{font-size:38px;font-weight:700;color:#fff;letter-spacing:-1.5px;margin-top:6px}
    .total-sub{font-size:13px;color:var(--text-dim);margin-top:6px}.total-sub strong{color:var(--text-mid)}
    .person-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .person-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;transition:border-color .2s}
    .person-card.positive{border-color:rgba(52,211,153,0.15)}.person-card.negative{border-color:rgba(248,113,113,0.15)}
    .person-name{font-size:13px;font-weight:600;color:#b8c8e0;margin-bottom:8px}
    .person-paid{font-size:17px;font-weight:700;color:#fff}
    .person-paid-sub{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}
    .person-diff{font-size:12px;font-weight:600;margin-top:6px}
    .person-diff.positive{color:var(--green)}.person-diff.negative{color:var(--red)}.person-diff.neutral{color:var(--text-dim)}
    .tabs{display:flex;gap:4px;margin-top:24px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border)}
    .tab{flex:1;padding:10px 8px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;background:transparent;border:none;color:var(--text-dim);font-family:var(--font)}.tab.active{background:rgba(59,130,246,0.12);color:#7fb3ff}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin:18px 0 12px}
    .section-title{font-size:14px;font-weight:600;color:var(--text-mid)}
    .list-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:6px}
    .list-item.transfer-row{border-color:rgba(167,139,250,0.1)}
    .item-info{flex:1;min-width:0}.item-what{font-size:13px;font-weight:600;color:#d0d8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-meta{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:var(--mono)}
    .item-amount{font-size:15px;font-weight:700;color:#fff;flex-shrink:0;margin-left:12px}.item-amount.transfer-amt{color:var(--purple)}
    .item-badge{font-size:9px;padding:2px 6px;border-radius:5px;font-weight:600;font-family:var(--mono);letter-spacing:.5px;margin-right:8px;flex-shrink:0}
    .badge-expense{background:rgba(59,130,246,0.1);color:var(--accent)}.badge-transfer{background:rgba(167,139,250,0.1);color:var(--purple)}
    .item-delete{background:none;border:none;color:#3a4560;cursor:pointer;font-size:18px;padding:4px 8px;line-height:1;opacity:.4;transition:opacity .15s,color .15s}.item-delete:hover{opacity:1;color:var(--red)}
    .confirm-btns{display:flex;gap:4px}.confirm-btns button{border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font);font-weight:600;border:1px solid}
    .btn-yes{background:#2a1515;border-color:#662222;color:var(--red)}.btn-no{background:var(--surface);border-color:rgba(255,255,255,0.1);color:var(--text-mid)}
    .settlement-card{background:linear-gradient(145deg,#111b25,#15223a);border:1px solid rgba(251,191,36,0.1);border-radius:18px;padding:22px;margin-top:24px}
    .settlement-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:14px}
    .transfer-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(251,191,36,0.03);border:1px solid rgba(251,191,36,0.08);border-radius:10px;margin-bottom:8px}.transfer-item:last-child{margin-bottom:0}
    .transfer-from{font-size:14px;font-weight:600;color:var(--red);min-width:75px}.transfer-arrow{font-size:12px;color:var(--text-dim)}.transfer-to{font-size:14px;font-weight:600;color:var(--green);min-width:75px}
    .transfer-amount{font-size:15px;font-weight:700;color:var(--gold);margin-left:auto;font-family:var(--mono)}
    .settled-msg{font-size:14px;color:var(--green);text-align:center;padding:14px}
    .fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#3b82f6);border:none;color:#fff;font-size:30px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(37,99,235,0.35);transition:transform .2s;z-index:60}.fab:active{transform:scale(.95)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .2s;backdrop-filter:blur(4px)}
    .modal{background:linear-gradient(160deg,#111b2e,#152240);border-radius:22px 22px 0 0;padding:30px 22px 40px;width:100%;max-width:520px;border:1px solid rgba(255,255,255,0.08);border-bottom:none;animation:slideUp .25s}
    .modal h3{font-size:19px;font-weight:700;color:#fff;margin-bottom:22px}
    .modal-tabs{display:flex;gap:6px;margin-bottom:18px}
    .modal-tab{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-family:var(--font)}
    .modal-tab.act-e{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.25);color:#7fb3ff}
    .modal-tab.act-t{background:rgba(167,139,250,0.12);border-color:rgba(167,139,250,0.25);color:var(--purple)}
    .person-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
    .person-btn{padding:11px 4px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);background:var(--surface);border:1px solid var(--border);color:var(--text-dim)}.person-btn.active{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.25);color:#7fb3ff}
    .plabel{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:500}
    .form-input{width:100%;padding:15px 16px;border-radius:12px;font-size:15px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);outline:none;font-family:var(--font);margin-bottom:12px}.form-input:focus{border-color:rgba(59,130,246,0.3)}.form-input::placeholder{color:#3a4a60}.form-input.amount{font-size:22px;font-weight:700;font-family:var(--mono)}
    .for-who-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:22px}
    .for-who-btn{padding:9px 2px;border-radius:9px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);color:var(--text-dim)}.for-who-btn.active{background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.18);color:var(--green)}
    .submit-btn{width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);border:none;background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;box-shadow:0 4px 16px rgba(37,99,235,0.3)}.submit-btn:disabled{background:rgba(255,255,255,0.05);color:#3a4560;box-shadow:none;cursor:not-allowed}.submit-btn.purple{background:linear-gradient(135deg,#7c3aed,#a78bfa);box-shadow:0 4px 16px rgba(124,58,237,0.3)}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#122a1e;border:1px solid #1e5a3a;color:var(--green);padding:12px 24px;border-radius:14px;font-size:14px;font-weight:500;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:toastIn .3s;font-family:var(--font)}
    .empty-state{text-align:center;padding:20px;color:var(--text-dim);font-size:13px}
    .webhook-info{margin-top:20px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px}.webhook-info summary{font-size:12px;color:var(--text-dim);cursor:pointer;font-family:var(--mono)}.webhook-info pre{font-size:11px;color:var(--text-mid);margin-top:10px;font-family:var(--mono);line-height:1.6;white-space:pre-wrap}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const CREW=["Kai","Patrick L.","Patrick Lu.","Flo"];
const fmt=n=>n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2});
let S={expenses:[],transfers:[],summary:null,activeTab:"all",showForm:false,formType:"expense",formPerson:"Kai",formWhat:"",formAmount:"",formForWho:"Alle",formTo:"Kai",formNote:"",confirmDelete:null,confirmDeleteType:null,toast:null};
function setState(p){Object.assign(S,p);render()}
async function loadAll(){try{const[a,b,c]=await Promise.all([fetch("/api/expenses"),fetch("/api/transfers"),fetch("/api/summary")]);const[e,t,s]=await Promise.all([a.json(),b.json(),c.json()]);setState({expenses:e,transfers:t,summary:s})}catch(e){}}
async function addExpense(){if(!S.formWhat||!S.formAmount)return;await fetch("/api/expenses",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({person:S.formPerson,what:S.formWhat,amount:parseFloat(S.formAmount.replace(",",".")),for_who:S.formForWho})});setState({showForm:false,formWhat:"",formAmount:""});showToast("\u2713 Ausgabe hinzugef\u00fcgt");loadAll()}
async function addTransfer(){if(!S.formAmount||S.formPerson===S.formTo)return;await fetch("/api/transfers",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({from_person:S.formPerson,to_person:S.formTo,amount:parseFloat(S.formAmount.replace(",",".")),note:S.formNote||""})});setState({showForm:false,formAmount:"",formNote:""});showToast("\u2713 Zahlung erfasst");loadAll()}
async function del(id,type){await fetch(`/api/${type}/${id}`,{method:"DELETE"});setState({confirmDelete:null,confirmDeleteType:null});showToast("Gel\u00f6scht");loadAll()}
function showToast(m){setState({toast:m});setTimeout(()=>setState({toast:null}),2500)}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function render(){
const s=S.summary;if(!s){document.getElementById("app").innerHTML='<div class="empty-state">Laden...</div>';return}
const nb=s.netBalances;
document.getElementById("app").innerHTML=`
${S.toast?`<div class="toast">${S.toast}</div>`:""}
<div class="header"><div class="header-inner"><span class="emoji">\ud83c\udfc2</span><div><h1>Livigno 2026</h1><div class="sub">Gruppenkasse</div></div></div></div>
<div class="container">
<div class="total-card"><div class="total-label">Gesamtausgaben</div><div class="total-amount">${fmt(s.totalExpenses)} \u20ac</div><div class="total-sub">\u2192 <strong>${fmt(s.perPerson)} \u20ac</strong> pro Person</div></div>
<div class="person-grid">${CREW.map(p=>{const n=nb[p];const cl=n>0.01?"positive":n<-0.01?"negative":"";const tx=s.totalTransferred[p]||0;return`<div class="person-card ${cl}"><div class="person-name">${p}</div><div class="person-paid">${fmt(s.paid[p])} \u20ac bezahlt</div>${tx>0?`<div class="person-paid-sub">+ ${fmt(tx)} \u20ac \u00fcberwiesen</div>`:""}<div class="person-diff ${cl||"neutral"}">${n>0.01?`+${fmt(n)} \u20ac Guthaben`:n<-0.01?`${fmt(n)} \u20ac offen`:"\u00b10,00 \u20ac ausgeglichen"}</div></div>`}).join("")}</div>
<div class="settlement-card"><div class="settlement-title">\ud83d\udcb8 Noch zu zahlen</div>${s.remainingTransfers.length===0?'<div class="settled-msg">\u2713 Alles ausgeglichen!</div>':s.remainingTransfers.map(t=>`<div class="transfer-item"><span class="transfer-from">${esc(t.from)}</span><span class="transfer-arrow">\u2192</span><span class="transfer-to">${esc(t.to)}</span><span class="transfer-amount">${fmt(t.amount)} \u20ac</span></div>`).join("")}</div>
<div class="tabs"><button class="tab ${S.activeTab==="all"?"active":""}" onclick="setState({activeTab:'all'})">Alles</button><button class="tab ${S.activeTab==="expenses"?"active":""}" onclick="setState({activeTab:'expenses'})">Ausgaben</button><button class="tab ${S.activeTab==="transfers"?"active":""}" onclick="setState({activeTab:'transfers'})">Zahlungen</button></div>
${S.activeTab!=="transfers"?`<div class="section-header"><div class="section-title">\ud83d\udcb0 Ausgaben (${S.expenses.length})</div></div>${S.expenses.length===0?'<div class="empty-state">Keine</div>':S.expenses.map(e=>`<div class="list-item"><span class="item-badge badge-expense">AUSGABE</span><div class="item-info"><div class="item-what">${esc(e.what)}</div><div class="item-meta">${esc(e.person)} \u00b7 ${esc(e.date)} \u00b7 ${esc(e.for_who)}</div></div><div class="item-amount">${fmt(e.amount)} \u20ac</div>${S.confirmDelete===e.id&&S.confirmDeleteType==="expenses"?`<div class="confirm-btns"><button class="btn-yes" onclick="del(${e.id},'expenses')">Ja</button><button class="btn-no" onclick="setState({confirmDelete:null})">Nein</button></div>`:`<button class="item-delete" onclick="setState({confirmDelete:${e.id},confirmDeleteType:'expenses'})">\u00d7</button>`}</div>`).join("")}`:""}
${S.activeTab!=="expenses"?`<div class="section-header"><div class="section-title">\ud83d\udcb8 Zahlungen (${S.transfers.length})</div></div>${S.transfers.length===0?'<div class="empty-state">Keine</div>':S.transfers.map(t=>`<div class="list-item transfer-row"><span class="item-badge badge-transfer">ZAHLUNG</span><div class="item-info"><div class="item-what">${esc(t.from_person)} \u2192 ${esc(t.to_person)}</div><div class="item-meta">${esc(t.note||"")} \u00b7 ${esc(t.date)}</div></div><div class="item-amount transfer-amt">${fmt(t.amount)} \u20ac</div>${S.confirmDelete===t.id&&S.confirmDeleteType==="transfers"?`<div class="confirm-btns"><button class="btn-yes" onclick="del(${t.id},'transfers')">Ja</button><button class="btn-no" onclick="setState({confirmDelete:null})">Nein</button></div>`:`<button class="item-delete" onclick="setState({confirmDelete:${t.id},confirmDeleteType:'transfers'})">\u00d7</button>`}</div>`).join("")}`:""}
<details class="webhook-info"><summary>\ud83d\udd17 API / n8n</summary><pre>GET /api/webhook/add?person=Kai&betrag=25&was=Bier
POST /api/transfers {from_person,to_person,amount,note}
GET /api/summary</pre></details>
</div>
<button class="fab" onclick="setState({showForm:true,formType:'expense',formPerson:'Kai',formTo:'Kai',formWhat:'',formAmount:'',formNote:'',formForWho:'Alle'})">+</button>
${S.showForm?renderModal():""}`;
}
function renderModal(){const isE=S.formType==="expense";return`<div class="modal-overlay" onclick="if(event.target===this)setState({showForm:false})"><div class="modal"><h3>${isE?"Neue Ausgabe":"Neue Zahlung"}</h3><div class="modal-tabs"><button class="modal-tab ${isE?"act-e":""}" onclick="setState({formType:'expense'})">\ud83d\udcb0 Ausgabe</button><button class="modal-tab ${!isE?"act-t":""}" onclick="setState({formType:'transfer'})">\ud83d\udcb8 Zahlung</button></div>${isE?`<div class="plabel">Bezahlt von:</div><div class="person-selector">${CREW.map(p=>`<button class="person-btn ${S.formPerson===p?"active":""}" onclick="setState({formPerson:'${p}'})">${p}</button>`).join("")}</div><input class="form-input" type="text" placeholder="Wof\u00fcr?" value="${esc(S.formWhat)}" oninput="S.formWhat=this.value"><input class="form-input amount" type="text" inputmode="decimal" placeholder="0,00 \u20ac" value="${esc(S.formAmount)}" oninput="S.formAmount=this.value"><div class="plabel">F\u00fcr:</div><div class="for-who-selector">${["Alle",...CREW].map(p=>`<button class="for-who-btn ${S.formForWho===p?"active":""}" onclick="setState({formForWho:'${p}'})">${p}</button>`).join("")}</div><button class="submit-btn" ${!S.formWhat||!S.formAmount?"disabled":""} onclick="addExpense()">Ausgabe hinzuf\u00fcgen</button>`:`<div class="plabel">Von:</div><div class="person-selector">${CREW.map(p=>`<button class="person-btn ${S.formPerson===p?"active":""}" onclick="setState({formPerson:'${p}'})">${p}</button>`).join("")}</div><div class="plabel">An:</div><div class="person-selector">${CREW.map(p=>`<button class="person-btn ${S.formTo===p?"active":""}" onclick="setState({formTo:'${p}'})">${p}</button>`).join("")}</div><input class="form-input amount" type="text" inputmode="decimal" placeholder="0,00 \u20ac" value="${esc(S.formAmount)}" oninput="S.formAmount=this.value"><input class="form-input" type="text" placeholder="Notiz (PayPal, Bar...)" value="${esc(S.formNote)}" oninput="S.formNote=this.value"><button class="submit-btn purple" ${!S.formAmount||S.formPerson===S.formTo?"disabled":""} onclick="addTransfer()">Zahlung erfassen</button>`}</div></div>`}
loadAll();
</script>
</body>
</html>
