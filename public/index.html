<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0e1a">
  <title>Livigno 2026 · Gruppenkasse</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏂</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}:root{--bg:#080c16;--surface:rgba(255,255,255,0.03);--surface-hover:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);--border-accent:rgba(100,140,255,0.15);--text:#e0e5f0;--text-dim:#5a6f8a;--text-mid:#8899b4;--accent:#3b82f6;--green:#34d399;--red:#f87171;--gold:#fbbf24;--font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;min-height:100dvh;overflow-x:hidden}.header{background:linear-gradient(135deg,#0f1829 0%,#141e33 100%);border-bottom:1px solid var(--border);padding:24px 20px 20px;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}.header-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:14px}.header h1{font-size:19px;font-weight:700;color:#fff;letter-spacing:-0.4px}.header .sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-family:var(--mono)}.header .emoji{font-size:30px;line-height:1}.container{max-width:520px;margin:0 auto;padding:0 16px 120px}.total-card{background:linear-gradient(145deg,#111b30 0%,#152242 100%);border:1px solid var(--border-accent);border-radius:18px;padding:26px;margin-top:20px;position:relative;overflow:hidden}.total-card::before{content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);pointer-events:none}.total-label{font-size:11px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono)}.total-amount{font-size:38px;font-weight:700;color:#fff;letter-spacing:-1.5px;margin-top:6px}.total-sub{font-size:13px;color:var(--text-dim);margin-top:6px}.total-sub strong{color:var(--text-mid)}.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.person-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;transition:border-color 0.2s}.person-card.positive{border-color:rgba(52,211,153,0.15)}.person-card.negative{border-color:rgba(248,113,113,0.15)}.person-name{font-size:13px;font-weight:600;color:#b8c8e0;margin-bottom:8px}.person-paid{font-size:19px;font-weight:700;color:#fff}.person-diff{font-size:12px;font-weight:600;margin-top:6px}.person-diff.positive{color:var(--green)}.person-diff.negative{color:var(--red)}.person-diff.neutral{color:var(--text-dim)}.section-header{display:flex;justify-content:space-between;align-items:center;margin:28px 0 14px}.section-title{font-size:14px;font-weight:600;color:var(--text-mid);letter-spacing:0.3px}.expense-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:6px;transition:background 0.15s}.expense-item:active{background:var(--surface-hover)}.expense-info{flex:1;min-width:0}.expense-what{font-size:13px;font-weight:600;color:#d0d8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.expense-meta{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:var(--mono)}.expense-amount{font-size:15px;font-weight:700;color:#fff;flex-shrink:0;margin-left:12px}.expense-delete{background:none;border:none;color:#3a4560;cursor:pointer;font-size:18px;padding:4px 8px;line-height:1;opacity:0.4;transition:opacity 0.15s,color 0.15s}.expense-delete:hover{opacity:1;color:var(--red)}.confirm-btns{display:flex;gap:4px}.confirm-btns button{border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font);font-weight:600;border:1px solid}.btn-yes{background:#2a1515;border-color:#662222;color:var(--red)}.btn-no{background:var(--surface);border-color:rgba(255,255,255,0.1);color:var(--text-mid)}.settlement-toggle{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;width:100%;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--text-mid);font-family:var(--font);margin-top:28px;transition:background 0.15s}.settlement-toggle:hover{background:var(--surface-hover)}.settlement-toggle span{font-size:14px;font-weight:600}.settlement-arrow{font-size:18px;transition:transform 0.25s}.settlement-arrow.open{transform:rotate(180deg)}.settlement-body{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:8px;animation:slideDown 0.2s ease}.transfer-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(251,191,36,0.03);border:1px solid rgba(251,191,36,0.08);border-radius:10px;margin-bottom:8px}.transfer-item:last-child{margin-bottom:0}.transfer-from{font-size:14px;font-weight:600;color:var(--red);min-width:80px}.transfer-arrow{font-size:12px;color:var(--text-dim)}.transfer-to{font-size:14px;font-weight:600;color:var(--green);min-width:80px}.transfer-amount{font-size:15px;font-weight:700;color:var(--gold);margin-left:auto;font-family:var(--mono)}.settled-msg{font-size:14px;color:var(--green);text-align:center;padding:14px}.fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#3b82f6);border:none;color:#fff;font-size:30px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(37,99,235,0.35);transition:transform 0.2s,box-shadow 0.2s;z-index:60}.fab:hover{transform:scale(1.08);box-shadow:0 8px 32px rgba(37,99,235,0.45)}.fab:active{transform:scale(0.95)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn 0.2s ease;backdrop-filter:blur(4px)}.modal{background:linear-gradient(160deg,#111b2e,#152240);border-radius:22px 22px 0 0;padding:30px 22px 40px;width:100%;max-width:520px;border:1px solid rgba(255,255,255,0.08);border-bottom:none;animation:slideUp 0.25s ease}.modal h3{font-size:19px;font-weight:700;color:#fff;margin-bottom:22px}.person-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}.person-btn{padding:11px 4px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:var(--font);background:var(--surface);border:1px solid var(--border);color:var(--text-dim)}.person-btn.active{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.25);color:#7fb3ff}.form-input{width:100%;padding:15px 16px;border-radius:12px;font-size:15px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);outline:none;font-family:var(--font);margin-bottom:12px;transition:border-color 0.2s}.form-input:focus{border-color:rgba(59,130,246,0.3)}.form-input::placeholder{color:#3a4a60}.form-input.amount{font-size:22px;font-weight:700;font-family:var(--mono)}.for-who-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:22px}.for-who-btn{padding:9px 2px;border-radius:9px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);color:var(--text-dim)}.for-who-btn.active{background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.18);color:var(--green)}.submit-btn{width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);border:none;background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;transition:all 0.2s;box-shadow:0 4px 16px rgba(37,99,235,0.3)}.submit-btn:disabled{background:rgba(255,255,255,0.05);color:#3a4560;box-shadow:none;cursor:not-allowed}.submit-btn:not(:disabled):active{transform:scale(0.98)}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#122a1e;border:1px solid #1e5a3a;color:var(--green);padding:12px 24px;border-radius:14px;font-size:14px;font-weight:500;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:toastIn 0.3s ease;font-family:var(--font)}.empty-state{text-align:center;padding:30px 20px;color:var(--text-dim);font-size:14px}.webhook-info{margin-top:20px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px}.webhook-info summary{font-size:12px;color:var(--text-dim);cursor:pointer;font-family:var(--mono);letter-spacing:0.5px}.webhook-info pre{font-size:11px;color:var(--text-mid);margin-top:10px;font-family:var(--mono);line-height:1.6;word-break:break-all;white-space:pre-wrap}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const CREW=["Kai","Patrick L.","Patrick Lu.","Flo"];const fmt=n=>n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2});let state={expenses:[],showForm:false,formPerson:"Kai",formWhat:"",formAmount:"",formForWho:"Alle",confirmDelete:null,showSettlement:false,toast:null,loading:true};function setState(patch){Object.assign(state,patch);render()}async function loadExpenses(){try{const res=await fetch("/api/expenses");const data=await res.json();setState({expenses:data,loading:false})}catch(e){setState({loading:false})}}async function addExpense(){if(!state.formWhat||!state.formAmount)return;try{const res=await fetch("/api/expenses",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({person:state.formPerson,what:state.formWhat,amount:parseFloat(state.formAmount.replace(",",".")),for_who:state.formForWho})});const expense=await res.json();setState({expenses:[...state.expenses,expense],showForm:false,formWhat:"",formAmount:""});showToast(`\u2713 ${fmt(expense.amount)} \u20ac von ${expense.person}`)}catch(e){showToast("Fehler beim Speichern")}}async function deleteExpense(id){try{await fetch(`/api/expenses/${id}`,{method:"DELETE"});setState({expenses:state.expenses.filter(e=>e.id!==id),confirmDelete:null});showToast("Ausgabe gel\u00f6scht")}catch(e){showToast("Fehler beim L\u00f6schen")}}function showToast(msg){setState({toast:msg});setTimeout(()=>setState({toast:null}),2500)}function calculate(){const total=state.expenses.reduce((s,e)=>s+e.amount,0);const perPerson=total/4;const paid={};CREW.forEach(p=>paid[p]=0);state.expenses.forEach(e=>{if(paid[e.person]!==undefined)paid[e.person]+=e.amount});const balances={};CREW.forEach(p=>balances[p]=paid[p]-perPerson);const debtors=CREW.filter(p=>balances[p]<-0.01).map(p=>({name:p,amount:-balances[p]})).sort((a,b)=>b.amount-a.amount);const creditors=CREW.filter(p=>balances[p]>0.01).map(p=>({name:p,amount:balances[p]})).sort((a,b)=>b.amount-a.amount);const transfers=[];let di=0,ci=0;const d=debtors.map(x=>({...x}));const c=creditors.map(x=>({...x}));while(di<d.length&&ci<c.length){const t=Math.min(d[di].amount,c[ci].amount);if(t>0.01)transfers.push({from:d[di].name,to:c[ci].name,amount:Math.round(t*100)/100});d[di].amount-=t;c[ci].amount-=t;if(d[di].amount<0.01)di++;if(c[ci].amount<0.01)ci++}return{total,perPerson,paid,balances,transfers}}function render(){const{total,perPerson,paid,balances,transfers}=calculate();const app=document.getElementById("app");app.innerHTML=`${state.toast?`<div class="toast">${state.toast}</div>`:''}<div class="header"><div class="header-inner"><span class="emoji">\ud83c\udfc2</span><div><h1>Livigno 2026</h1><div class="sub">Gruppenkasse</div></div></div></div><div class="container"><div class="total-card"><div class="total-label">Gesamtausgaben</div><div class="total-amount">${fmt(total)} \u20ac</div><div class="total-sub">\u2192 <strong>${fmt(perPerson)} \u20ac</strong> pro Person</div></div><div class="person-grid">${CREW.map(p=>{const diff=balances[p];const cls=diff>0.01?'positive':diff<-0.01?'negative':'';const icon=p==='Kai'?'\ud83c\udfbf ':p==='Flo'?'\ud83d\ude97 ':'';return`<div class="person-card ${cls}"><div class="person-name">${icon}${p}</div><div class="person-paid">${fmt(paid[p])} \u20ac</div><div class="person-diff ${cls||'neutral'}">${diff>0.01?`+${fmt(diff)} \u20ac Guthaben`:diff<-0.01?`${fmt(diff)} \u20ac schuldet`:'\u00b10,00 \u20ac ausgeglichen'}</div></div>`}).join('')}</div><div class="section-header"><div class="section-title">Ausgaben (${state.expenses.length})</div></div>${state.expenses.length===0?'<div class="empty-state">Noch keine Ausgaben erfasst</div>':state.expenses.map(e=>`<div class="expense-item"><div class="expense-info"><div class="expense-what">${esc(e.what)}</div><div class="expense-meta">${esc(e.person)} \u00b7 ${esc(e.date)} \u00b7 ${esc(e.for_who)}</div></div><div class="expense-amount">${fmt(e.amount)} \u20ac</div>${state.confirmDelete===e.id?`<div class="confirm-btns"><button class="btn-yes" onclick="deleteExpense(${e.id})">Ja</button><button class="btn-no" onclick="setState({confirmDelete:null})">Nein</button></div>`:`<button class="expense-delete" onclick="setState({confirmDelete:${e.id}})">\u00d7</button>`}</div>`).join('')}<button class="settlement-toggle" onclick="setState({showSettlement:!state.showSettlement})"><span>\ud83d\udcb8 Abrechnung</span><span class="settlement-arrow ${state.showSettlement?'open':''}">&#x25be;</span></button>${state.showSettlement?`<div class="settlement-body">${transfers.length===0?'<div class="settled-msg">\u2713 Alles ausgeglichen!</div>':transfers.map(t=>`<div class="transfer-item"><span class="transfer-from">${t.from}</span><span class="transfer-arrow">\u2192</span><span class="transfer-to">${t.to}</span><span class="transfer-amount">${fmt(t.amount)} \u20ac</span></div>`).join('')}</div>`:''}<details class="webhook-info"><summary>\ud83d\udd17 API / n8n Webhook</summary><pre>GET ${location.origin}/api/webhook/add\n  ?person=Kai\n  &betrag=25.50\n  &was=Supermarkt\n  &fuer=Alle\n\nPersonen: Kai, Patrick L., Patrick Lu., Flo</pre></details></div><button class="fab" onclick="setState({showForm:true})">+</button>${state.showForm?`<div class="modal-overlay" onclick="if(event.target===this)setState({showForm:false})"><div class="modal"><h3>Neue Ausgabe</h3><div class="person-selector">${CREW.map(p=>`<button class="person-btn ${state.formPerson===p?'active':''}" onclick="setState({formPerson:'${p}'})">${p}</button>`).join('')}</div><input class="form-input" type="text" placeholder="Wof\u00fcr? (Supermarkt, Skipass...)" value="${esc(state.formWhat)}" oninput="state.formWhat=this.value"><input class="form-input amount" type="text" inputmode="decimal" placeholder="0,00 \u20ac" value="${esc(state.formAmount)}" oninput="state.formAmount=this.value"><div class="for-who-selector">${["Alle",...CREW].map(p=>`<button class="for-who-btn ${state.formForWho===p?'active':''}" onclick="setState({formForWho:'${p}'})">${p}</button>`).join('')}</div><button class="submit-btn" ${!state.formWhat||!state.formAmount?'disabled':''} onclick="addExpense()">Ausgabe hinzuf\u00fcgen</button></div></div>`:''}`}function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}loadExpenses();
  </script>
</body>
</html>
