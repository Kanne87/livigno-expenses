<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFF8F0">
<title>Livigno 2026 – Gruppenkasse</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛷️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FFF8F0;--surface:#FFFDF9;--primary:#C8956C;--primary-hover:#B8854C;--accent:#D4A574;--text:#2C1810;--text2:#6B4E3D;--border:#E8D5C4;--success:#7BA05B;--warning:#D4A017;--error:#C75050;--gold:#9a7b2e;--gold-light:rgba(154,123,46,0.08)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px;margin:0 auto;padding:0 16px 100px}
h1{font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:26px;letter-spacing:-0.5px}
.header{padding:28px 0 14px;text-align:center}
.header .sub{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text2);text-transform:uppercase}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;text-align:center}
.sum-card .label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.sum-card .val{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:18px}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:3px}
.tab{flex:1;padding:8px 0;border-radius:9px;border:none;cursor:pointer;font-size:11px;font-weight:500;font-family:'Inter',system-ui,sans-serif;background:transparent;color:var(--text2);transition:all 0.25s}
.tab.active{background:var(--primary);color:#fff;font-weight:700}
.section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;padding:6px 0 6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;transition:all 0.25s}
.card:hover{box-shadow:0 4px 20px rgba(200,149,108,0.12);border-color:var(--accent)}
.card-row{display:flex;justify-content:space-between;align-items:flex-start}
.card .title{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:14px}
.card .meta{font-size:11px;color:var(--text2)}
.card .amt{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:16px;text-align:right}
.card .per{font-size:10px;color:var(--text2)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.badge-all{color:var(--success);background:rgba(123,160,91,0.12);border:1px solid rgba(123,160,91,0.25)}
.badge-split{color:var(--warning);background:rgba(212,160,23,0.15);border:1px solid rgba(212,160,23,0.3)}
.badge-receipt{color:var(--primary);background:rgba(200,149,108,0.15);border:1px solid rgba(200,149,108,0.25);cursor:pointer;font-size:9px}
.riders{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.rider{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid}
.btn-del{margin-top:6px;font-size:9px;color:rgba(199,80,80,0.6);background:transparent;border:1px solid rgba(199,80,80,0.25);border-radius:6px;padding:2px 8px;cursor:pointer;font-weight:600}
.transfer .arrow{color:var(--accent);font-weight:700;font-size:13px}
.transfer .amt{color:var(--success)}
.fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:16px;background:var(--primary);color:#fff;border:none;font-size:26px;font-weight:300;cursor:pointer;box-shadow:0 6px 24px rgba(200,149,108,0.35);display:flex;align-items:center;justify-content:center;transition:all 0.25s;z-index:100}
.fab:hover{background:var(--primary-hover);transform:scale(1.08)}
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(44,24,16,0.4);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border-radius:20px;padding:24px;width:100%;max-width:440px;border:1px solid var(--border);box-shadow:0 24px 60px rgba(44,24,16,0.18);max-height:92vh;overflow-y:auto}
.modal h3{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:20px;margin:0 0 14px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:0.5px;text-transform:uppercase}
.form-input{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;color:var(--text);outline:none;font-family:'Inter',system-ui,sans-serif;margin-bottom:12px}
.form-input:focus{border-color:var(--primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pill-group{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:4px 10px;border-radius:10px;font-size:11px;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-weight:500;transition:all 0.2s;font-family:'Inter',system-ui,sans-serif}
.pill.active{background:rgba(200,149,108,0.18);border-color:var(--primary);color:var(--primary);font-weight:700}
.btn{padding:11px 18px;border-radius:12px;border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all 0.2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn:disabled{background:var(--border);color:var(--text2);cursor:not-allowed}
.upload-area{width:100%;padding:14px;border-radius:12px;border:2px dashed var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',system-ui,sans-serif;text-align:center;margin-bottom:14px;transition:all 0.3s}
.upload-area.analyzing{border-color:var(--accent);background:var(--gold-light);color:var(--primary)}
.ai-hint{font-size:11px;color:var(--success);font-weight:600;background:rgba(123,160,91,0.12);padding:6px 12px;border-radius:10px;margin-bottom:12px;border:1px solid rgba(123,160,91,0.2)}
.split-info{font-size:11px;color:var(--warning);font-weight:600;background:rgba(212,160,23,0.1);padding:5px 10px;border-radius:10px;margin-bottom:10px;border:1px solid rgba(212,160,23,0.2)}
.per-person{font-size:11px;color:var(--text2);padding:5px 10px;background:var(--gold-light);border-radius:10px;margin-bottom:14px}
.balance-bar{height:4px;background:rgba(232,213,196,0.6);border-radius:2px;overflow:hidden;margin-top:3px}
.balance-fill{height:100%;border-radius:2px;transition:width 0.5s}
.log-entry{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;font-size:12px}
.log-entry .log-action{font-weight:700;color:var(--text)}.log-entry .log-time{font-size:10px;color:var(--text2)}.log-entry .log-desc{color:var(--text2);font-size:11px}.log-entry .log-actor{font-size:10px;color:var(--accent);margin-top:2px}
.hidden{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--primary);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="header">
    <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="font-size:26px">⛷️</span><h1>Livigno 2026</h1>
    </div>
    <div class="sub">Gruppenkasse · <span id="rider-count">4</span> Riders</div>
  </div>
  <div class="summary">
    <div class="sum-card"><div class="label">Ausgaben</div><div class="val" id="total-exp">0,00 €</div></div>
    <div class="sum-card"><div class="label">Zahlungen</div><div class="val" id="total-pay" style="color:var(--success)">0,00 €</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="alles">Alles</button>
    <button class="tab" data-tab="ausgaben">Ausgaben</button>
    <button class="tab" data-tab="zahlungen">Zahlungen</button>
    <button class="tab" data-tab="bilanz">Bilanz</button>
    <button class="tab" data-tab="log">Log</button>
  </div>
  <div id="content"></div>
</div>
<button class="fab" id="fab-add" title="Neue Ausgabe">+</button>

<script>
const P={bg:"#FFF8F0",surface:"#FFFDF9",primary:"#C8956C",accent:"#D4A574",text:"#2C1810",text2:"#6B4E3D",border:"#E8D5C4",success:"#7BA05B",warning:"#D4A017",error:"#C75050"};
const CATS={transport:"✈️",accommodation:"🏠",food:"🍕",equipment:"⛷️",activity:"🎿",drinks:"🍺",lift:"🚡",other:"📦"};
const COLORS={Kai:"#C8956C",Flo:"#7BA05B","Patrick L.":"#D4A017","Patrick Lu.":"#6B4E3D"};
const fmt=n=>n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
let state={tab:"alles",expenses:[],transfers:[],summary:null,log:[],crew:[]};

async function load(){
  const [s,l]=await Promise.all([fetch("/api/summary").then(r=>r.json()),fetch("/api/audit-log").then(r=>r.json())]);
  state.summary=s;state.expenses=s.expenses;state.transfers=s.transfers;state.crew=s.fullCrew;state.log=l;
  document.getElementById("total-exp").textContent=fmt(s.totalExpenses);
  document.getElementById("total-pay").textContent=fmt(s.transfers.reduce((a,t)=>a+t.amount,0));
  document.getElementById("rider-count").textContent=s.fullCrew.length;
  render();
}

function riderBadge(name,small){const c=COLORS[name]||P.text2;return `<span class="rider" style="color:${c};border-color:${c}40;background:${c}18;${small?"font-size:9px;padding:1px 5px;":""}">${name}</span>`;}

function expenseCard(e){
  const group=e.for_who==="Alle"?state.crew:e.for_who==="Reise"?state.summary.activeCrew:e.for_who.includes(",")?e.for_who.split(",").map(s=>s.trim()):[e.for_who];
  const pp=e.amount/group.length;const partial=group.length<state.crew.length;
  const hasReceipt=!!e.receipt_data||!!e.details;
  return `<div class="card"><div class="card-row"><div style="flex:1;min-width:0">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px">
      <span style="font-size:15px">${CATS[e.category]||"📦"}</span><span class="title">${e.what}</span>
      ${hasReceipt?`<span class="badge badge-receipt" onclick="viewReceipt(${e.id})">📷 Beleg</span>`:""}
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span class="meta">${e.person} · ${e.date}</span>
      ${partial?`<span class="badge badge-split">÷${group.length}</span>`:`<span class="badge badge-all">Alle</span>`}
    </div>
    <div class="riders">${group.map(n=>riderBadge(n,true)).join("")}</div>
    ${e.merchant?`<div class="meta" style="margin-top:6px;padding-top:6px;border-top:1px solid ${P.border}60">🏪 ${e.merchant}${e.details?" — "+e.details:""}</div>`:""}
  </div><div style="text-align:right;min-width:85px;flex-shrink:0">
    <div class="amt">${fmt(e.amount)}</div><div class="per">${fmt(pp)} / Pers.</div>
    <button class="btn-del" onclick="delExpense(${e.id})">Löschen</button>
  </div></div></div>`;
}

function transferCard(t){
  return `<div class="card transfer"><div class="card-row" style="align-items:center">
    <div><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">${riderBadge(t.from_person,true)}<span class="arrow">→</span>${riderBadge(t.to_person,true)}</div>
    <div class="meta">${t.note||""} · ${t.date}</div></div>
    <div class="amt" style="color:var(--success)">${fmt(t.amount)}</div>
  </div></div>`;
}

function balanceView(){
  if(!state.summary)return"";const s=state.summary;
  const sorted=state.crew.map(p=>({name:p,bal:s.netBalances[p]||0})).sort((a,b)=>b.bal-a.bal);
  const mx=Math.max(...sorted.map(r=>Math.abs(r.bal)),1);
  let html=`<div class="card" style="padding:16px 18px"><div class="title" style="margin-bottom:12px">Bilanz</div>`;
  sorted.forEach(r=>{
    const pos=r.bal>0;const w=Math.min(Math.abs(r.bal)/mx*100,100);
    const col=Math.abs(r.bal)<1?P.text2+"40":pos?P.success:P.error;
    html+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
      ${riderBadge(r.name,true)}<span style="font-weight:700;font-size:13px;color:${Math.abs(r.bal)<1?P.text2:pos?P.success:P.error}">${pos?"+":""}${fmt(r.bal)}</span>
    </div><div class="balance-bar"><div class="balance-fill" style="width:${w}%;background:${col}"></div></div></div>`;
  });
  if(s.remainingTransfers.length){
    html+=`<div style="margin-top:16px;padding-top:12px;border-top:1px solid ${P.border}"><div class="form-label" style="margin-bottom:8px">Offene Ausgleichszahlungen</div>`;
    s.remainingTransfers.forEach(t=>{html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px">${riderBadge(t.from,true)}<span class="arrow" style="color:var(--accent);font-weight:700">→</span>${riderBadge(t.to,true)}<span style="font-weight:700;color:var(--error)">${fmt(t.amount)}</span></div>`;});
    html+=`</div>`;
  }
  return html+`</div>`;
}

function logView(){
  if(!state.log.length)return`<div class="section-title">📋 Protokoll (0)</div><div class="meta" style="text-align:center;padding:20px">Noch keine Einträge</div>`;
  const icons={create:"➕",delete:"🗑️",init:"🚀"};
  let html=`<div class="section-title">📋 Protokoll (${state.log.length})</div>`;
  state.log.forEach(e=>{
    const d=new Date(e.created_at+"Z");const ts=d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    html+=`<div class="log-entry"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
      <span class="log-action">${icons[e.action]||"📝"} ${e.action==="create"?"Hinzugefügt":e.action==="delete"?"Gelöscht":"Initialisiert"}</span>
      <span class="log-time">${ts}</span></div>
      <div class="log-desc">${e.description||""}</div>
      ${e.actor?`<div class="log-actor">von ${e.actor}</div>`:""}</div>`;
  });
  return html;
}

function render(){
  const c=document.getElementById("content");const t=state.tab;let html="";
  if(t==="alles"||t==="ausgaben"){
    html+=`<div class="section-title">💰 Ausgaben (${state.expenses.length})</div>`;
    state.expenses.forEach(e=>{html+=expenseCard(e);});
  }
  if(t==="alles"||t==="zahlungen"){
    html+=`<div class="section-title" ${t==="alles"?'style="margin-top:8px"':""}>🎉 Zahlungen (${state.transfers.length})</div>`;
    state.transfers.forEach(tr=>{html+=transferCard(tr);});
  }
  if(t==="bilanz")html=balanceView();
  if(t==="log")html=logView();
  c.innerHTML=html;
}

// Tabs
document.querySelectorAll(".tab").forEach(btn=>{btn.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));btn.classList.add("active");
  state.tab=btn.dataset.tab;render();
});});

// Delete
async function delExpense(id){
  if(!confirm("Ausgabe wirklich löschen?"))return;
  await fetch(`/api/expenses/${id}`,{method:"DELETE"});load();
}

// View Receipt
async function viewReceipt(id){
  const e=state.expenses.find(x=>x.id===id);if(!e)return;
  let receiptHtml="";
  try{const r=await fetch(`/api/expenses/${id}/receipt`);const d=await r.json();
    if(d.receipt_data){const match=d.receipt_data.match(/^data:(.*?);base64,(.*)$/);
      if(match)receiptHtml=`<img src="${d.receipt_data}" style="width:100%;border-radius:12px;margin-bottom:12px">`;}
  }catch{}
  const m=document.createElement("div");m.className="overlay";m.onclick=()=>m.remove();
  m.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><h3 style="font-size:17px">Beleg: ${e.what}</h3>
    ${receiptHtml}${e.merchant?`<div class="meta" style="margin-bottom:4px">🏪 ${e.merchant}</div>`:""}
    ${e.details?`<div class="meta" style="margin-bottom:8px">📝 ${e.details}</div>`:""}
    <button class="btn btn-primary" style="width:100%" onclick="this.closest('.overlay').remove()">Schließen</button></div>`;
  document.body.appendChild(m);
}

// Add Modal
document.getElementById("fab-add").onclick=()=>{
  const crew=state.crew;let selectedFor=[...crew];let selectedBy=crew[0];let selectedCat="other";let analyzing=false;let receiptB64=null;
  const m=document.createElement("div");m.className="overlay";m.onclick=()=>m.remove();
  m.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <h3>Neue Ausgabe</h3>
    <input type="file" id="receipt-file" accept="image/*" capture="environment" style="display:none">
    <button class="upload-area" id="upload-btn">📷 Beleg fotografieren oder hochladen</button>
    <div id="ai-result" class="hidden"></div>
    <div id="receipt-preview" class="hidden" style="margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid var(--border);max-height:100px"></div>
    <label class="form-label">Beschreibung</label><input class="form-input" id="inp-what" placeholder="z.B. Skiausrüstung">
    <div class="form-row"><div><label class="form-label">Betrag (€)</label><input class="form-input" id="inp-amount" type="number" step="0.01" placeholder="0,00"></div>
    <div><label class="form-label">Datum</label><input class="form-input" id="inp-date" placeholder="z.B. 16.02."></div></div>
    <div id="merchant-row" class="hidden"><label class="form-label">Händler</label><input class="form-input" id="inp-merchant"></div>
    <div id="details-row" class="hidden"><label class="form-label">Details (KI)</label><textarea class="form-input" id="inp-details" rows="2" style="resize:vertical;font-family:inherit"></textarea></div>
    <label class="form-label">Bezahlt von</label><div class="pill-group" id="paid-by"></div>
    <label class="form-label">Kategorie</label><div class="pill-group" id="cat-pills"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><label class="form-label" style="margin:0">Aufgeteilt auf</label>
    <div><span style="font-size:11px;color:var(--primary);cursor:pointer;font-weight:600;margin-right:8px" id="sel-all">Alle</span><span style="font-size:11px;color:var(--text2);cursor:pointer;font-weight:600" id="sel-none">Keine</span></div></div>
    <div class="pill-group" id="split-pills"></div>
    <div id="split-info" class="hidden"></div><div id="per-person" class="hidden"></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-secondary" style="flex:1" onclick="this.closest('.overlay').remove()">Abbrechen</button>
    <button class="btn btn-primary" style="flex:2" id="btn-submit" disabled>Hinzufügen</button></div></div>`;
  document.body.appendChild(m);

  // Paid-by pills
  const paidByDiv=m.querySelector("#paid-by");
  crew.forEach(p=>{const pill=document.createElement("button");pill.className="pill"+(p===selectedBy?" active":"");pill.textContent=p;
    pill.onclick=()=>{selectedBy=p;paidByDiv.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));pill.classList.add("active");};paidByDiv.appendChild(pill);});

  // Category pills
  const catDiv=m.querySelector("#cat-pills");
  Object.entries(CATS).forEach(([k,icon])=>{const pill=document.createElement("button");pill.className="pill"+(k===selectedCat?" active":"");pill.textContent=icon+" "+k;
    pill.onclick=()=>{selectedCat=k;catDiv.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));pill.classList.add("active");};catDiv.appendChild(pill);});

  // Split pills
  function renderSplit(){
    const div=m.querySelector("#split-pills");div.innerHTML="";
    crew.forEach(p=>{const pill=document.createElement("button");pill.className="pill"+(selectedFor.includes(p)?" active":"");pill.textContent=p;
      pill.onclick=()=>{if(selectedFor.includes(p))selectedFor=selectedFor.filter(x=>x!==p);else selectedFor.push(p);renderSplit();updateUI();};div.appendChild(pill);});
    const info=m.querySelector("#split-info");const pp=m.querySelector("#per-person");
    if(selectedFor.length>0&&selectedFor.length<crew.length){info.className="split-info";info.textContent=`÷${selectedFor.length} — Nur ${selectedFor.join(" & ")}`;}else{info.className="split-info hidden";}
    const amt=parseFloat(m.querySelector("#inp-amount").value);
    if(selectedFor.length>0&&amt>0){pp.className="per-person";pp.textContent=fmt(amt/selectedFor.length)+" pro Person";}else{pp.className="per-person hidden";}
  }
  renderSplit();
  m.querySelector("#sel-all").onclick=()=>{selectedFor=[...crew];renderSplit();updateUI();};
  m.querySelector("#sel-none").onclick=()=>{selectedFor=[];renderSplit();updateUI();};

  function updateUI(){
    const w=m.querySelector("#inp-what").value.trim();const a=parseFloat(m.querySelector("#inp-amount").value);
    m.querySelector("#btn-submit").disabled=!(w&&a>0&&selectedFor.length>0);renderSplit();
  }
  m.querySelector("#inp-what").oninput=updateUI;m.querySelector("#inp-amount").oninput=updateUI;

  // Receipt upload
  const fileInput=m.querySelector("#receipt-file");
  m.querySelector("#upload-btn").onclick=()=>fileInput.click();
  fileInput.onchange=async(ev)=>{
    const file=ev.target.files[0];if(!file)return;
    const btn=m.querySelector("#upload-btn");btn.className="upload-area analyzing";btn.innerHTML='<span class="spinner"></span>Beleg wird analysiert…';
    const reader=new FileReader();reader.onload=async()=>{
      receiptB64=reader.result;
      const base64Only=reader.result.split(",")[1];const mime=file.type||"image/jpeg";
      // Show preview
      m.querySelector("#receipt-preview").className="";m.querySelector("#receipt-preview").innerHTML=`<img src="${reader.result}" style="width:100%;object-fit:cover;max-height:100px">`;
      try{
        const resp=await fetch("/api/receipts/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({image_base64:base64Only,mime_type:mime})});
        if(resp.ok){const r=await resp.json();
          if(r.title)m.querySelector("#inp-what").value=r.title;
          if(r.amount)m.querySelector("#inp-amount").value=r.amount;
          if(r.date)m.querySelector("#inp-date").value=r.date;
          if(r.category&&CATS[r.category]){selectedCat=r.category;catDiv.querySelectorAll(".pill").forEach(x=>x.classList.toggle("active",x.textContent.includes(r.category)));}
          if(r.merchant){m.querySelector("#merchant-row").className="";m.querySelector("#inp-merchant").value=r.merchant;}
          if(r.details){m.querySelector("#details-row").className="";m.querySelector("#inp-details").value=r.details;}
          m.querySelector("#ai-result").className="ai-hint";m.querySelector("#ai-result").textContent="✨ KI hat den Beleg analysiert – bitte prüfen";
        }
      }catch(e){console.error(e);}
      btn.className="upload-area";btn.textContent="📷 Anderen Beleg hochladen";updateUI();
    };reader.readAsDataURL(file);
  };

  // Submit
  m.querySelector("#btn-submit").onclick=async()=>{
    const forWho=selectedFor.length===crew.length?"Alle":selectedFor.join(",");
    await fetch("/api/expenses",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      person:selectedBy,what:m.querySelector("#inp-what").value.trim(),amount:parseFloat(m.querySelector("#inp-amount").value),
      for_who:forWho,category:selectedCat,merchant:m.querySelector("#inp-merchant")?.value||null,details:m.querySelector("#inp-details")?.value||null,
      receipt_data:receiptB64||null
    })});
    m.remove();load();
  };
};

// Init
load();
</script>
</body>
</html>
